services:
  ralph-web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # No ports — Traefik routes via labels
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ralph-web.rule=Host(`ralph.soleenterprises.com`)"
      - "traefik.http.routers.ralph-web.entrypoints=websecure"
      - "traefik.http.routers.ralph-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.ralph-web.loadbalancer.server.port=80"
    networks:
      - dokploy-network
    volumes:
      # Loop workspace — preserves files across restarts
      - ralph-workspace:/workspace
      # Claude Code auth (~/.claude) — persist so you only auth once
      - ralph-claude-auth:/root/.claude
      # ralph state (~/.ralph) — preserves loop registry, memories, tasks
      - ralph-state:/root/.ralph

networks:
  dokploy-network:
    external: true

volumes:
  ralph-workspace:
  ralph-claude-auth:
  ralph-state:
